# Full stack: operators + instances in dependency order.
# Prefer phased overlays (01-operators .. 06-maas) for production so you can
# wait for each phase to be ready before applying the next.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/operators/nfd
  - ../../base/operators/nvidia
  - ../../base/operators/connectivity-link
  - ../../base/operators/rhoai
  - ../../base/instances/nfd
  - ../../base/instances/nvidia
  - ../../base/instances/kuadrant
  - ../../base/instances/gateway
  - ../../base/instances/dsc
  - ../../base/instances/maas
