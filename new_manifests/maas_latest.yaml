  kind: ClusterRole
  name: maas-controller-role
subjects:
- kind: ServiceAccount
  name: maas-controller
  namespace: opendatahub
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: maas-controller
    control-plane: maas-controller
  name: maas-controller
  namespace: opendatahub
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: maas-controller
  template:
    metadata:
      labels:
        app: maas-controller
        control-plane: maas-controller
    spec:
      containers:
      - args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --gateway-name=$(GATEWAY_NAME)
        - --gateway-namespace=$(GATEWAY_NAMESPACE)
        - --maas-api-namespace=$(MAAS_API_NAMESPACE)
        - --cluster-audience=$(CLUSTER_AUDIENCE)
        command:
        - /manager
        env:
        - name: GATEWAY_NAME
          value: maas-default-gateway
        - name: GATEWAY_NAMESPACE
          value: openshift-ingress
        - name: MAAS_API_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CLUSTER_AUDIENCE
          value: https://kubernetes.default.svc
        image: quay.io/opendatahub/maas-controller:latest
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      securityContext:
        runAsNonRoot: true
      serviceAccountName: maas-controller
      terminationGracePeriodSeconds: 10
---
apiVersion: extensions.kuadrant.io/v1alpha1
kind: TelemetryPolicy
metadata:
  labels:
    app.kubernetes.io/part-of: maas-observability
  name: user-group
  namespace: openshift-ingress
spec:
  metrics:
    default:
      labels:
        cost_center: auth.identity.costCenter
        model: responseBodyJSON("/model")
        organization_id: auth.identity.organizationId
        subscription: auth.identity.selected_subscription
        tier: auth.identity.tier
        user: auth.identity.userid
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: maas-default-gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    opendatahub.io/managed: "false"
    security.opendatahub.io/authorino-tls-bootstrap: "true"
  labels:
    app.kubernetes.io/component: gateway
    app.kubernetes.io/instance: maas-default-gateway
    app.kubernetes.io/name: maas
    opendatahub.io/managed: "false"
  name: maas-default-gateway
  namespace: openshift-ingress
spec:
  gatewayClassName: openshift-default
  listeners:
  - allowedRoutes:
      namespaces:
        from: All
    hostname: maas.${CLUSTER_DOMAIN}
    name: http
    port: 80
    protocol: HTTP
  - allowedRoutes:
      namespaces:
        from: All
    hostname: maas.${CLUSTER_DOMAIN}
    name: https
    port: 443
    protocol: HTTPS
    tls:
      certificateRefs:
      - group: ""
        kind: Secret
        name: ${CERT_NAME}
      mode: Terminate
---
apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  labels:
    app.kubernetes.io/part-of: maas-observability
  name: latency-per-tier
  namespace: openshift-ingress
spec:
  metrics:
  - overrides:
    - match:
        metric: REQUEST_DURATION
        mode: CLIENT_AND_SERVER
      tagOverrides:
        tier:
          operation: UPSERT
          value: request.headers["x-maas-tier"]
    providers:
    - name: prometheus
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: maas-default-gateway
