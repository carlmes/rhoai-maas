kind: ConfigMap
apiVersion: v1
metadata:
  name: default-gateway-config
  namespace: openshift-ingress
data:
  # this is required to allow invalid certs in chain between OCP and Artifactory
  deployment: |
    spec:
      template:
        spec:
          containers:
          - name: istio-proxy
            env:
            - name: WASM_INSECURE_REGISTRIES
              value: registry-nonprod.sdi.corp.bankofamerica.com
  # this is required in the LAB not in future clusters
  service: |
    spec:
      type: ClusterIP